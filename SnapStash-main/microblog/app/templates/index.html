{% extends "base.html" %}

{% block content %}
<div class="login-page-container">
    <div class="central-header">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='SnapStash_Logo_200.png') }}" class="icon">
            <span class="logo-text" style="font-size: 60px !important;">SnapStash</span>
        </div>
    </div>

    <div class="dashboard-container text-center" style="max-width: 1000px; width: 100%; margin: 0 auto;">
    <div class="glass-card" style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 50px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);">
        <h2 style="color: white; font-weight: 300; font-size: 28px;">
            Welcome back, <span style="color: #7289da; font-weight: 700;">{{ user.username }}!</span>
        </h2>
        
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 40px;">
            <a href="{{ url_for('create_album') }}" class="btn-primary-custom" style="width: 100%; max-width: 350px; background: #5865f2; color: white; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: 800;">
                CREATE ALBUM
            </a>
            <a href="{{ url_for('albums_list') }}" class="btn-primary-custom" style="width: 100%; max-width: 350px; background: #4e5d94; color: white; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: 800;">
                VIEW MY ALBUMS
            </a>
        </div>

            <div style="margin-top: 50px;">
                <a href="{{ url_for('logout') }}" style="color: rgba(255,255,255,0.3); text-decoration: none; font-size: 14px; font-weight: 600;">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
