{% extends "base.html" %}

{% block content %}
<div class="login-page-container" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1d26 0%, #0d0f14 100%);">
    
    <!-- THE ULTIMATE HERO LOGO SECTION -->
    <div class="central-header" style="margin-bottom: 60px; text-align: center; width: 100%;">
        <div class="logo-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 40px;">
            <!-- Icon scaled up to match massive text -->
            <img src="{{ url_for('static', filename='assets/SnapStash_Logo_200.png') }}" class="icon" style="height: 140px; width: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));">
            
            <!-- MAXIMIZED SNAPSTASH WORD -->
            <span class="logo-text" style="font-size: 120px !important; font-weight: 950; color: white; letter-spacing: -6px; text-shadow: 0 15px 40px rgba(0,0,0,0.6); line-height: 1;">
                SnapStash
            </span>
        </div>
    </div>

    <div class="dashboard-container text-center" style="max-width: 1100px; width: 95%; display: flex; flex-direction: column; align-items: center;">
        
        <!-- SUB-HEADER SECTION -->
        <div class="header-main-row" style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; width: 100%;">
            <a href="{{ url_for('index') }}" class="back-link" style="position: absolute; left: 0; color: white; text-decoration: none; font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0.6;">
                &lt; Back
            </a>
            <h1 class="display-title" style="font-size: 50px; font-weight: 800; margin: 0; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 1px;">MY ALBUMS</h1>
        </div>

        <!-- ALBUM SELECTION CARD -->
        <div class="glass-card" style="background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); padding: 50px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 800px; box-shadow: 0 40px 100px rgba(0,0,0,0.5);">
            <div style="display: flex; flex-direction: column; gap: 18px; align-items: center;">
                {% for album in albums %}
                <a href="{{ url_for('my_album', album_id=album.id) }}" class="btn-primary-custom" style="width: 100%; max-width: 480px; background: #5865f2; color: white; padding: 20px; border-radius: 60px; text-decoration: none; font-weight: 900; font-size: 17px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;">
                     {{ album.title }}
                </a>
                {% endfor %}
                
                {% if not albums %}
                <p style="color: rgba(255,255,255,0.4); font-size: 18px; font-weight: 500;">No albums found. Go back to create one!</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
    /* Prevent text wrapping on the massive logo */
    .logo-text {
        white-space: nowrap;
        font-family: 'Inter', sans-serif; /* Ensuring a bold, modern font */
    }

    .btn-primary-custom:hover {
        background: #4752c4 !important;
        transform: scale(1.04) translateY(-3px);
        box-shadow: 0 15px 30px rgba(88, 101, 242, 0.4) !important;
    }
    
    .back-link:hover {
        opacity: 1 !important;
        transform: translateX(-5px); 
        transition: 0.3s;
    }

    /* Cinematic entrance animation */
    .logo-wrapper {
        animation: logoEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes logoEntrance {
        from { opacity: 0; transform: scale(0.9); filter: blur(10px); }
        to { opacity: 1; transform: scale(1); filter: blur(0); }
    }
</style>
{% endblock %}
