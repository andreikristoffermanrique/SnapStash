{% extends "base.html" %}

{% block content %}
<div class="login-page-container">
    
    <div class="central-header" style="margin-bottom: 20px;">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='SnapStash_Logo_200.png') }}" class="icon">
            <span class="logo-text" style="font-size: 60px !important;">SnapStash</span>
        </div>
    </div>

    <div class="dashboard-container text-center">
        <h1 class="hero-section h1">Welcome back, <span class="blue-text">{{ user.username }}</span>!</h1>
        <p class="hero-subtext">Your albums preserve the moments that matter most.</p>
        
        <hr style="border-color: rgba(255,255,255,0.1); margin: 30px 0;">

        <div class="albums-list-container" style="display: flex; flex-direction: column; gap: 25px; align-items: center; width: 100%;">
            
            <a href="{{ url_for('create_album') }}" class="btn-album-action">
                CREATE ALBUM
            </a>

            {% if albums %}
                {% for album in albums %}
                    <a href="{{ url_for('my_album', album_id=album.id) }}" class="btn-album-action">
                        VIEW ALBUM: {{ album.title|upper }}
                    </a>
                {% endfor %}
            {% endif %}

        </div>

        <div class="mt-5" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <a href="{{ url_for('logout') }}" class="signup-text" style="text-decoration: none; font-size: 14px;">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
