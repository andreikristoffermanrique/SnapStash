<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}SnapStash{% endblock %}</title>
        
        <!-- 1. BOOTSTRAP & GOOGLE FONTS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        
        <!-- 2. GLOBAL STYLES -->
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        
        {% block styles %}{% endblock %}
    </head>
    <body>
        <!-- 3. FLASH MESSAGES (Kept for your routes.py logic) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-wrapper" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999;">
              {% for message in messages %}
                <div class="alert-custom">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- 4. MAIN CONTENT AREA -->
        <main>
            {% block content %}{% endblock %}
        </main>

        <!-- 5. SCRIPTS (Moved to bottom for better performance) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        
        {% block scripts %}{% endblock %}
    </body>
</html>
