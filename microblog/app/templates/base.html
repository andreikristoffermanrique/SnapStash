<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/SnapStash_Logo_200.png') }}">
        
        <title>{% block title %}SnapStash{% endblock %}</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        
        {% block styles %}{% endblock %}
    </head>
    <body>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-wrapper" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; align-items: center;">
              {% for message in messages %}
                <div class="alert-custom flash-item">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <main>
            {% block content %}{% endblock %}
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const flashMessages = document.querySelectorAll('.flash-item');
                flashMessages.forEach(function(msg) {
                    setTimeout(function() {
                        // Smooth fade and slide up
                        msg.style.transition = "opacity 0.8s ease, transform 0.8s ease";
                        msg.style.opacity = "0";
                        msg.style.transform = "translateY(-10px)";
                        
                        // Remove from DOM after animation finishes
                        setTimeout(() => msg.remove(), 800);
                    }, 3000); 
                });
            });
        </script>
        
        {% block scripts %}{% endblock %}
    </body>
</html>
