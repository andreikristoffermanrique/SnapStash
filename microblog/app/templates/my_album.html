{% extends "base.html" %}

{% block content %}
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<div id="react-root"></div>

<script type="text/babel">
    const { useState } = React;

    const initialPhotos = [
        {% for photo in selected_album.photos %}
        { 
            id: "{{ photo.id }}", 
            url: "{{ url_for('static', filename='uploads/' + photo.filename) }}",
            filename: "{{ photo.filename }}"
        },
        {% endfor %}
    ];

    const URLS = {
        back: "{{ url_for('albums_list') }}",
        logo: "{{ url_for('static', filename='assets/SnapStash_Logo_200.png') }}",
        present: "{{ url_for('present_album', album_id=selected_album.id) }}",
        addPhoto: "{{ url_for('add_photo', album_id=selected_album.id) }}"
    };

    {% raw %}
    function AlbumStack() {
        const [photos, setPhotos] = useState(initialPhotos);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isEditMode, setIsEditMode] = useState(false);
        const [selectedIds, setSelectedIds] = useState([]);
        
        // Modal State
        const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null, message: '' });

        const nextImage = () => {
            if (photos.length === 0) return;
            setCurrentIndex((prev) => (prev + 1) % photos.length);
        };

        const toggleSelect = (id) => {
            setSelectedIds(prev => 
                prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
            );
        };

        const saveAlbum = () => {
            document.getElementById('form-title').value = document.getElementById('edit-title-input').value;
            document.getElementById('form-description').value = document.getElementById('edit-desc-input').value;
            document.getElementById('edit-album-form').submit();
        };

        // Open Modal for Album Deletion
        const handleDeleteAlbumClick = () => {
            setModalConfig({
                isOpen: true,
                type: 'album',
                message: 'Are you sure you want to delete this entire album? This action cannot be undone.'
            });
        };

        // Open Modal for Photo(s) Deletion
        const handleDeletePhotosClick = () => {
            if (selectedIds.length === 0) return;
            setModalConfig({
                isOpen: true,
                type: 'photos',
                message: `Are you sure you want to delete the ${selectedIds.length} selected photo(s)?`
            });
        };

        // Execute actual deletion asynchronously for photos
        const executeDelete = async () => {
            if (modalConfig.type === 'album') {
                document.getElementById('delete-album-form').submit();
            } else if (modalConfig.type === 'photos') {
                const formAction = document.getElementById('delete-photos-form').action;
                const formData = new FormData();
                
                selectedIds.forEach(id => {
                    formData.append('photo_ids', id);
                });

                try {
                    const response = await fetch(formAction, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        setPhotos(prevPhotos => prevPhotos.filter(photo => !selectedIds.includes(photo.id)));
                        setSelectedIds([]); 
                    } else {
                        console.error("Failed to delete photos from the server.");
                    }
                } catch (error) {
                    console.error("Error connecting to server:", error);
                }
                
                closeModal();
            }
        };

        // Handle async photo addition
        const handleAddPhotoChange = async (event) => {
            const fileInput = event.target;
            if (!fileInput.files || fileInput.files.length === 0) return;

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('pictures', fileInput.files[i]);
            }

            try {
                const response = await fetch(URLS.addPhoto, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // The backend redirects back to the album page. We fetch that HTML to extract the newly assigned IDs and URLs.
                    const htmlText = await response.text();
                    const match = htmlText.match(/const initialPhotos = (\[[\s\S]*?\]);/);
                    
                    if (match && match[1]) {
                        // Safely parse the generated JS array literal
                        const getNewPhotos = new Function(`return ${match[1]}`);
                        setPhotos(getNewPhotos());
                    }
                    
                    fileInput.value = ''; // Reset input to allow re-uploading the same file if needed
                } else {
                    console.error("Failed to upload photos.");
                }
            } catch (error) {
                console.error("Error uploading photos:", error);
            }
        };

        const closeModal = () => setModalConfig({ isOpen: false, type: null, message: '' });

        return (
            <div className="page-wrapper">
                <div className="main-container">
                    <div className="nav-header">
                        <div className="logo-container">
                            <img src={URLS.logo} className="logo-icon" alt="Logo" />
                            <span className="logo-text">SnapStash</span>
                        </div>
                    </div>

                    <div className="content-card">
                        <div className="card-inner">
                            <div className="album-header">
                                <div className="header-side header-left">
                                    {!isEditMode ? (
                                        <a href={URLS.back} className="back-btn">← Back</a>
                                    ) : (
                                        <span 
                                            className="back-btn" 
                                            style={{ cursor: 'pointer' }} 
                                            onClick={() => { setIsEditMode(false); setSelectedIds([]); }}
                                        >
                                            ← Back
                                        </span>
                                    )}
                                </div>
                                
                                <div className="header-center">
                                    {!isEditMode ? (
                                        <div className="title-display">
                                            <h1 className="hero-title">{% endraw %}{{ selected_album.title | upper }}{% raw %}</h1>
                                            <p className="description">{% endraw %}{{ selected_album.description }}{% raw %}</p>
                                        </div>
                                    ) : (
                                        <div className="edit-inputs">
                                            <input id="edit-title-input" placeholder="Album Title" defaultValue="{% endraw %}{{ selected_album.title }}{% raw %}" className="custom-input title-input" />
                                            <input id="edit-desc-input" placeholder="Add a description..." defaultValue="{% endraw %}{{ selected_album.description }}{% raw %}" className="custom-input desc-input" />
                                        </div>
                                    )}
                                </div>

                                <div className="header-side header-right">
                                    <div className="action-buttons-vertical">
                                        {!isEditMode ? (
                                            <>
                                                <button onClick={() => window.location.href = URLS.present} className="btn btn-primary">PRESENT</button>
                                                <button onClick={() => setIsEditMode(true)} className="btn btn-secondary">EDIT</button>
                                                <button onClick={handleDeleteAlbumClick} className="btn btn-danger-outline">DELETE ALBUM</button>
                                            </>
                                        ) : (
                                            <>
                                                <button onClick={saveAlbum} className="btn btn-primary">SAVE</button>
                                                {selectedIds.length > 0 && (
                                                    <button onClick={handleDeletePhotosClick} className="btn btn-danger">DELETE ({selectedIds.length})</button>
                                                )}
                                                <button onClick={() => { setIsEditMode(false); setSelectedIds([]); }} className="btn btn-secondary">CANCEL</button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <hr className="divider" />

                            <div className="display-area">
                                {!isEditMode ? (
                                    <div className="stack-wrapper">
                                        <div className="photo-stack" onClick={nextImage}>
                                            {photos.length > 0 ? [...photos].reverse().map((photo, i, arr) => {
                                                const originalIndex = photos.indexOf(photo);
                                                const offset = (originalIndex - currentIndex + photos.length) % photos.length;
                                                
                                                if (offset > 3) return null;

                                                return (
                                                    <div 
                                                        key={photo.id}
                                                        className="stack-img"
                                                        style={{
                                                            backgroundImage: `url(${photo.url})`,
                                                            zIndex: 10 - offset,
                                                            transform: `translateY(${offset * -18}px) scale(${1 - offset * 0.04}) rotate(${offset * -1.5}deg)`,
                                                            opacity: 1 - (offset * 0.15),
                                                            filter: `brightness(${1 - (offset * 0.1)})`
                                                        }}
                                                    />
                                                );
                                            }) : <div className="empty-msg">No photos found</div>}
                                        </div>
                                        <p className="hint">Click the photo to flip through the stack</p>
                                    </div>
                                ) : (
                                    <div className="edit-grid">
                                        {photos.map(photo => (
                                            <div key={photo.id} className={`grid-item ${selectedIds.includes(photo.id) ? 'selected' : ''}`} onClick={() => toggleSelect(photo.id)}>
                                                <img src={photo.url} alt="album content" />
                                                {selectedIds.includes(photo.id) && (
                                                    <div className="selection-overlay"><div className="check-circle">✓</div></div>
                                                )}
                                            </div>
                                        ))}
                                        
                                        <div className="add-btn-tile" onClick={() => document.getElementById('react-add-file-picker').click()}>
                                            <span className="plus">+</span>
                                            <span className="add-label">Add Photo</span>
                                        </div>
                                        
                                        {/* React-controlled file input hidden from view */}
                                        <input 
                                            type="file" 
                                            id="react-add-file-picker" 
                                            name="pictures" 
                                            multiple 
                                            style={{ display: 'none' }} 
                                            onChange={handleAddPhotoChange} 
                                            accept="image/*"
                                        />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>

                {/* Styled UI Delete Modal */}
                {modalConfig.isOpen && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <div className="modal-header">
                                <span>Confirm Deletion</span>
                                <button className="modal-close-x" onClick={closeModal}>✕</button>
                            </div>
                            <div className="modal-body">
                                <div className="modal-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                        <line x1="12" y1="9" x2="12" y2="13"></line>
                                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                    </svg>
                                </div>
                                <div className="modal-text">
                                    {modalConfig.message}
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" style={{ padding: '12px 24px', fontSize: '12px' }} onClick={closeModal}>CANCEL</button>
                                <button className="btn btn-danger" style={{ padding: '12px 24px', fontSize: '12px' }} onClick={executeDelete}>YES, DELETE</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('react-root'));
    root.render(<AlbumStack />);
    {% endraw %}
</script>

<style>
    :root {
        --bg-dark: #0d0f14;
        --card-bg: rgba(26, 29, 38, 0.95);
        --accent: #5865f2;
        --danger: #ff4757;
        --text-muted: rgba(255, 255, 255, 0.5);
    }

    html, body { 
        height: 100%; 
        margin: 0; 
        overflow: hidden; 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(rgba(10, 20, 40, 0.75), rgba(10, 20, 40, 0.85)), 
                    url("{{ url_for('static', filename='assets/camera_bg_1920v2.jpg') }}") no-repeat center center/cover; 
    }
    
    .page-wrapper {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
    }

    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1100px;
    }

    .nav-header { margin-bottom: 20px; }
    .logo-container { display: flex; align-items: center; gap: 25px; }
    
    .logo-icon { 
        height: 100px; 
        width: auto; 
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); 
    }
    .logo-text { 
        font-size: 90px; 
        font-weight: 950; 
        letter-spacing: -4px; 
        color: white; 
        text-shadow: 0 10px 20px rgba(0,0,0,0.5); 
    }

    .content-card {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        padding: 10px;
    }

    .card-inner {
        background: var(--card-bg);
        border-radius: 32px;
        padding: 40px;
        min-height: 600px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
    }

    .album-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .header-side { width: 160px; display: flex; }
    .header-left { justify-content: flex-start; }
    .header-right { justify-content: flex-end; }
    .header-center { flex-grow: 1; text-align: center; }

    .hero-title { margin: 0; font-size: 38px; font-weight: 900; letter-spacing: 1px; color: white; }
    .description { color: var(--text-muted); margin-top: 5px; font-size: 14px; text-transform: uppercase; }

    .edit-inputs {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
    }

    .custom-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 12px;
        border-radius: 10px;
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .action-buttons-vertical { display: flex; flex-direction: column; gap: 8px; width: 140px; }
    .back-btn { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: bold; transition: color 0.2s; }
    .back-btn:hover { color: white; }

    .btn {
        padding: 10px; border-radius: 6px; font-weight: 800; font-size: 10px;
        border: none; cursor: pointer; text-transform: uppercase;
        transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #4752c4; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #e84150; }
    .btn-danger-outline { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger-outline:hover { background: rgba(255, 71, 87, 0.1); }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 30px 0; }

    .display-area { 
        flex-grow: 1; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        overflow: hidden;
    }
    
    .stack-wrapper { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
    .photo-stack { position: relative; width: 300px; height: 400px; cursor: pointer; }
    
    .stack-img {
        position: absolute; 
        width: 100%; 
        height: 100%;
        background-size: cover; 
        background-position: center;
        border-radius: 24px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .hint { margin-top: 50px; color: var(--text-muted); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .empty-msg { color: var(--text-muted); display: flex; align-items: center; justify-content: center; height: 100%; }

    .edit-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        width: 100%;
        max-height: 450px;
        overflow-y: auto;
        padding: 10px;
    }
    .grid-item { aspect-ratio: 1; border-radius: 15px; overflow: hidden; position: relative; cursor: pointer; border: 3px solid transparent; transition: border-color 0.2s;}
    .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    .grid-item.selected { border-color: var(--accent); }
    .selection-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(88, 101, 242, 0.4); display: flex; align-items: center; justify-content: center; }
    .check-circle { width: 30px; height: 30px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

    .add-btn-tile { aspect-ratio: 1; border: 2px dashed rgba(255,255,255,0.15); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .add-btn-tile:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.3); }

    /* --- MODERN POP-UP MODAL STYLES --- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .modal-box {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 420px;
        max-width: 90vw;
        color: white;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        animation: modalFadeIn 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes modalFadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .modal-close-x {
        background: none;
        border: none;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        color: var(--text-muted);
        padding: 0;
        transition: color 0.2s;
    }

    .modal-close-x:hover {
        color: white;
    }

    .modal-body {
        display: flex;
        align-items: center;
        padding: 30px 24px;
        gap: 20px;
    }

    .modal-icon {
        width: 50px;
        height: 50px;
        background: rgba(255, 71, 87, 0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }

    .modal-text {
        font-size: 15px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.9);
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 0 24px 24px 24px;
    }
</style>

<form id="delete-photos-form" action="{{ url_for('delete_photos', album_id=selected_album.id) }}" method="POST" style="display:none;"></form>
<form id="delete-album-form" action="{{ url_for('delete_album', album_id=selected_album.id) }}" method="POST" style="display:none;"></form>
<form id="edit-album-form" action="{{ url_for('edit_album', album_id=selected_album.id) }}" method="POST" style="display:none;">
    <input type="hidden" id="form-title" name="title">
    <input type="hidden" id="form-description" name="description">
</form>
{% endblock %}
